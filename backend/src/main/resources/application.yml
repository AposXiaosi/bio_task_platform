server:
  port: ${BIOINFO_SERVER_PORT:8081}

spring:
  datasource:
    url: ${BIOINFO_DB_URL:jdbc:mysql://localhost:3306/bioinfo_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${BIOINFO_DB_USER:root}
    password: ${BIOINFO_DB_PASSWORD:}
    driver-class-name: ${BIOINFO_DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: ${BIOINFO_DB_DIALECT:org.hibernate.dialect.MySQLDialect}

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

bioinfo:
  upload:
    dir: ${BIOINFO_UPLOAD_DIR:./data/uploads}
