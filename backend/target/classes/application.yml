server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bioinfo_platform
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

bioinfo:
  upload:
    dir: D:/bioinfo-uploads
